<!DOCTYPE html>  <html>  <head>    <title>Werewolf GM Game</title>  <meta name="viewport"  
content="width=device-width, initial-scale=1.0">

  <style>  
  
    *{  
      box-sizing:border-box;  
    }  
  
    body{  
      margin:0;  
      padding:20px;  
      background:#111;  
      color:white;  
      font-family:Arial;  
    }  
  
    h1,h2,h3,p{  
      margin:0;  
    }  
  
    .top-bar{  
      background:#1a1a1a;  
      border-radius:18px;  
      padding:20px;  
      margin-bottom:20px;  
    }  
  
    .room-code{  
      color:#5865f2;  
      font-size:28px;  
      font-weight:bold;  
      margin-top:8px;  
    }  
  
    .game-status{  
      margin-top:15px;  
      display:flex;  
      gap:10px;  
      flex-wrap:wrap;  
    }  
  
    .status-box{  
      background:#222;  
      padding:10px 15px;  
      border-radius:12px;  
      font-size:14px;  
    }  
  
    .control-bar{  
      display:flex;  
      gap:10px;  
      margin-bottom:20px;  
    }  
  
    .control-bar button{  
      flex:1;  
    }  
  
    button{  
      border:none;  
      border-radius:14px;  
      padding:14px;  
      cursor:pointer;  
      color:white;  
      font-weight:bold;  
      font-size:15px;  
    }  
  
    .day-btn{  
      background:#f39c12;  
    }  
  
    .night-btn{  
      background:#5865f2;  
    }  
  
    .player-card{  
      background:#1e1e1e;  
      border-radius:18px;  
      padding:18px;  
      margin-bottom:15px;  
    }  
  
    .player-top{  
      display:flex;  
      justify-content:space-between;  
      align-items:center;  
      margin-bottom:15px;  
    }  
  
    .player-left{  
      display:flex;  
      align-items:center;  
      gap:12px;  
    }  
  
    .avatar{  
      width:55px;  
      height:55px;  
      border-radius:50%;  
      background:#5865f2;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      font-size:22px;  
      font-weight:bold;  
    }  
  
    .player-name{  
      font-size:20px;  
      font-weight:bold;  
    }  
  
    .role{  
      color:#aaa;  
      margin-top:4px;  
    }  
  
    .alive{  
      color:#57f287;  
      font-weight:bold;  
    }  
  
    .dead{  
      color:#ed4245;  
      font-weight:bold;  
    }  
  
    .action-box{  
      background:#181818;  
      padding:12px;  
      border-radius:12px;  
      margin-bottom:15px;  
    }  
  
    .memory-box{  
      background:#181818;  
      border-radius:14px;  
      padding:15px;  
      margin-bottom:15px;  
    }  
  
    .memory-title{  
      margin-bottom:10px;  
      font-size:16px;  
      font-weight:bold;  
    }  
  
    .memory-grid{  
      display:flex;  
      flex-wrap:wrap;  
      gap:10px;  
    }  
  
    .memory-item{  
      background:#222;  
      padding:8px 12px;  
      border-radius:10px;  
      font-size:14px;  
    }  
  
    textarea{  
      width:100%;  
      min-height:80px;  
      border:none;  
      border-radius:12px;  
      padding:12px;  
      background:#222;  
      color:white;  
      resize:none;  
      margin-top:10px;  
    }  
  
    .buttons{  
      display:flex;  
      gap:10px;  
      margin-top:15px;  
    }  
  
    .kill-btn{  
      background:#ed4245;  
      flex:1;  
    }  
  
    .revive-btn{  
      background:#57f287;  
      flex:1;  
    }  
  
    .save-btn{  
      background:#5865f2;  
      width:100%;  
      margin-top:12px;  
    }  
  
    .memory-buttons{  
      display:flex;  
      gap:8px;  
      flex-wrap:wrap;  
      margin-top:10px;  
    }  
  
    .memory-buttons button{  
      padding:10px 12px;  
      font-size:13px;  
      background:#333;  
    }  
  
    .active-memory{  
      background:#5865f2 !important;  
    }  
  
    .log-box{  
      background:#1a1a1a;  
      border-radius:18px;  
      padding:20px;  
      margin-top:25px;  
    }  
  
    .log-item{  
      padding:10px;  
      border-bottom:1px solid #333;  
    }  
  
  </style>  </head>  <body>  <h1>🎮 GM GAME PANEL</h1>  <div class="top-bar">    <div>ห้อง</div>    <div  
    class="room-code"  
    id="roomCode"  
  ></div>    <div class="game-status">  <div class="status-box">  
  ผู้เล่น:  
  <span id="totalPlayers"></span>  
</div>  

<div class="status-box">  
  รอด:  
  <span id="alivePlayers"></span>  
</div>  

<div class="status-box">  
  ตาย:  
  <span id="deadPlayers"></span>  
</div>

  </div>  </div>  <div class="control-bar">  <button
class="day-btn"
onclick="setPhase('กลางวัน')"

> 

☀️ กลางวัน

  </button>  <button
class="night-btn"
onclick="setPhase('กลางคืน')"

> 

🌙 กลางคืน

  </button>  </div>  <h2 style="margin-bottom:15px;">  
ผู้เล่น  
</h2>  <div id="gamePlayers"></div>  <div class="log-box">    <h2 style="margin-bottom:15px;">  
    📜 Game Logs  
  </h2>    <div id="logs"></div>  </div>  <script src="/socket.io/socket.io.js"></script>  <script>  
  
const socket = io();

let room = null;

const roomCode =
sessionStorage.getItem(
  "roomCode"
);

if(!roomCode){

  alert("ไม่พบห้อง");

  location.href =
  "index.html";

}

socket.emit(
  "getRoom",
  roomCode
);

socket.on(
  "roomData",
  (serverRoom)=>{

    room = serverRoom;

    document.getElementById(
      "roomCode"
    ).innerText =
    room.roomCode;

    renderPlayers();

    renderLogs();

  }
);
  
function renderPlayers(){  
  
  const container =  
    document.getElementById(  
      "gamePlayers"  
    );  
  
  container.innerHTML = "";  
  
  let alive = 0;  
  let dead = 0;  
  
  room.players.forEach(player=>{  
  
    if(!player.memory){  
  
      player.memory = {  
        killed:false,  
        protected:false,  
        muted:false,  
        poisoned:false,  
        cursed:false,  
        notes:""  
      };  
    }  
  
    if(player.alive){  
  
      alive++;  
  
    }else{  
  
      dead++;  
    }  
  
    const m =  
      player.memory;  
  
    const firstLetter =  
      player.name.charAt(0);  
  
    container.innerHTML += `  
  
      <div class="player-card">  
  
        <div class="player-top">  
  
          <div class="player-left">  
  
            <div class="avatar">  
              ${firstLetter}  
            </div>  
  
            <div>  
  
              <div class="player-name">  
                ${player.name}  
              </div>  
  
              <div class="role">  
  
  ${player.role}  
  
  ${  
    player.role === "นักล่าหัว"  
    &&  
    player.target  
  
    ?  
  
    `  
    <br>  
    🎯 เป้า:  
    ${player.target}  
    `  
  
    :  
  
    ""  
  }  
  
</div>  
  
            </div>  
  
          </div>  
  
          <div class="  
            ${player.alive  
              ? "alive"  
              : "dead"}  
          ">  
  
            ${  
              player.alive  
              ? "รอด"  
              : "ตาย"  
            }  
  
          </div>  
  
        </div>  
  
        <div class="action-box">  
  
          Action:  
          ${  
            player.action  
            || "-"  
          }  
  
        </div>  
  
        <div class="memory-box">  
  
          <div class="memory-title">  
            🧠 ความจำคืนนี้  
          </div>  
  
          <div class="memory-grid">  
  
            ${  
              m.killed  
              ? `<div class="memory-item">🩸 โดนฆ่า</div>`  
              : ""  
            }  
  
            ${  
              m.protected  
              ? `<div class="memory-item">🛡️ โดนป้องกัน</div>`  
              : ""  
            }  
  
            ${  
              m.muted  
              ? `<div class="memory-item">🤐 โดนใบ้</div>`  
              : ""  
            }  
  
            ${  
              m.poisoned  
              ? `<div class="memory-item">☠️ โดนพิษ</div>`  
              : ""  
            }  
  
            ${  
              m.cursed  
              ? `<div class="memory-item">🕸️ โดนสาป</div>`  
              : ""  
            }  
  
          </div>  
  
          <div class="memory-buttons">  
  
            <button  
              class="${  
                m.killed  
                ? "active-memory"  
                : ""  
              }"  
              onclick="  
              toggleMemory(  
                '${player.name}',  
                'killed'  
              )  
              "  
            >  
              🩸 ฆ่า  
            </button>  
  
            <button  
              class="${  
                m.protected  
                ? "active-memory"  
                : ""  
              }"  
              onclick="  
              toggleMemory(  
                '${player.name}',  
                'protected'  
              )  
              "  
            >  
              🛡️ กัน  
            </button>  
  
            <button  
              class="${  
                m.muted  
                ? "active-memory"  
                : ""  
              }"  
              onclick="  
              toggleMemory(  
                '${player.name}',  
                'muted'  
              )  
              "  
            >  
              🤐 ใบ้  
            </button>  
  
            <button  
              class="${  
                m.poisoned  
                ? "active-memory"  
                : ""  
              }"  
              onclick="  
              toggleMemory(  
                '${player.name}',  
                'poisoned'  
              )  
              "  
            >  
              ☠️ พิษ  
            </button>  
  
            <button  
              class="${  
                m.cursed  
                ? "active-memory"  
                : ""  
              }"  
              onclick="  
              toggleMemory(  
                '${player.name}',  
                'cursed'  
              )  
              "  
            >  
              🕸️ สาป  
            </button>  
  
          </div>  
  
          <textarea  
            placeholder="โน้ตเพิ่มเติม..."  
            onchange="  
            updateNotes(  
              '${player.name}',  
              this.value  
            )  
            "  
          >${m.notes}</textarea>  </div>  

    <div class="buttons">  

      <button  
        class="kill-btn"  
        onclick="  
        killPlayer(  
          '${player.name}'  
        )  
        "  
      >  
        ฆ่า  
      </button>  

      <button  
        class="revive-btn"  
        onclick="  
        revivePlayer(  
          '${player.name}'  
        )  
        "  
      >  
        ชุบ  
      </button>  

    </div>  

  </div>  

`;

});

document.getElementById(
"totalPlayers"
).innerText =
room.players.length;

document.getElementById(
"alivePlayers"
).innerText =
alive;

document.getElementById(
"deadPlayers"
).innerText =
dead;

}

function toggleMemory(
  name,
  type
){

  socket.emit(
    "toggleMemory",
    {
      roomCode: room.roomCode,
      name,
      type
    }
  );

}

function updateNotes(
  name,
  value
){

  socket.emit(
    "updateNotes",
    {
      roomCode: room.roomCode,
      name,
      value
    }
  );

}

function killPlayer(name){

  socket.emit(
    "killPlayer",
    {
      roomCode: room.roomCode,
      name
    }
  );

}

function revivePlayer(name){

  socket.emit(
    "revivePlayer",
    {
      roomCode: room.roomCode,
      name
    }
  );

}

function setPhase(phase){

  socket.emit(
    "setPhase",
    {
      roomCode: room.roomCode,
      phase
    }
  );

}





</script>  </body>  </html>
