<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <!-- สำคัญมาก -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Werewolf Game</title>

  <link rel="stylesheet" href="style.css">

  <style>

    *{
      box-sizing:border-box;

      /* ปิดการคัดลอก */
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    body{

      margin:0;

      background:#111;
      color:white;

      font-family:Arial,sans-serif;

      min-height:100vh;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      padding:20px;
      text-align:center;
    }

    h1{

      margin-bottom:40px;

      font-size:clamp(
        32px,
        6vw,
        60px
      );
    }

    .menu{

      width:100%;
      max-width:600px;
    }

    button{

      width:100%;

      padding:20px;

      margin-bottom:18px;

      border:none;

      border-radius:18px;

      background:#5865f2;

      color:white;

      font-size:clamp(
        18px,
        3vw,
        28px
      );

      font-weight:bold;

      cursor:pointer;

      transition:0.2s;
    }

    button:active{

      transform:scale(0.97);
    }

    .hidden{
      display:none;
    }

    .room-card{

      background:#1e1e1e;

      padding:18px;

      border-radius:18px;

      margin-bottom:15px;

      font-size:20px;
    }

    .delete-btn{

      background:#ed4245;

      margin-top:12px;
    }

    a{

      text-decoration:none;
      width:100%;
    }

    #secretPanel{

      width:100%;
      max-width:700px;

      margin-top:30px;
    }

  </style>

</head>

<body>

<h1 id="secretTrigger">
  Werewolf Online
</h1>

<div class="menu">

  <a href="player.html">
    <button>
      เข้าเป็นผู้เล่น
    </button>
  </a>

  <a href="host-create.html">
    <button>
      เข้าเป็น GM
    </button>
  </a>

</div>

<div
  id="secretPanel"
  class="hidden"
>

  <h2>
    🔒 SECRET ADMIN
  </h2>

  <div id="roomList"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let tapCount = 0;

let tapTimer = null;

const trigger =
document.getElementById(
  "secretTrigger"
);

trigger.addEventListener(
  "click",
  ()=>{

    tapCount++;

    clearTimeout(
      tapTimer
    );

    tapTimer =
    setTimeout(()=>{

      tapCount = 0;

    },1500);

    if(tapCount >= 5){

      openSecretPanel();

      tapCount = 0;

    }

  }
);

function openSecretPanel(){

  document.getElementById(
    "secretPanel"
  ).classList.remove(
    "hidden"
  );

  socket.emit(
    "getAllRooms"
  );

}

socket.on(
  "allRooms",
  (rooms)=>{

    const roomList =
    document.getElementById(
      "roomList"
    );

    roomList.innerHTML = "";

    if(rooms.length <= 0){

      roomList.innerHTML =
      "ไม่มีห้อง";

      return;

    }

    rooms.forEach(room=>{

      roomList.innerHTML += `

        <div class="room-card">

          <div>
            ห้อง:
            <b>${room.roomCode}</b>
          </div>

          <div>
            ผู้เล่น:
            ${room.players.length}
          </div>

          <button
            class="delete-btn"
            onclick="
              deleteRoom(
                '${room.roomCode}'
              )
            "
          >
            ยุบห้อง
          </button>

        </div>

      `;

    });

  }
);

function deleteRoom(roomCode){

  const confirmDelete =
  confirm(
    "ยุบห้อง " + roomCode + " ?"
  );

  if(!confirmDelete) return;

  socket.emit(
    "closeRoom",
    roomCode
  );

  socket.emit(
    "getAllRooms"
  );

}

</script>

</body>

</html>
