<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Werewolf Game</title>

<style>

*{
  box-sizing:border-box;

  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}

body{

  margin:0;
  padding:20px;

  background:#111;
  color:white;

  font-family:Arial,sans-serif;

  text-align:center;
}

h1{

  margin-top:30px;
  margin-bottom:40px;

  font-size:42px;
}

.menu{

  width:100%;
  max-width:500px;

  margin:auto;
}

button{

  width:100%;

  padding:18px;

  margin-bottom:15px;

  border:none;

  border-radius:16px;

  background:#5865f2;

  color:white;

  font-size:22px;

  font-weight:bold;

  cursor:pointer;
}

button:active{

  opacity:0.8;
}

.hidden{
  display:none;
}

.room-card{

  background:#1e1e1e;

  padding:15px;

  border-radius:14px;

  margin-bottom:12px;

  font-size:20px;
}

.delete-btn{

  background:#ed4245;

  margin-top:10px;
}

a{

  text-decoration:none;
}

#secretPanel{

  width:100%;
  max-width:600px;

  margin:auto;
  margin-top:30px;
}

/* มือถือ */

@media (max-width:600px){

  h1{
    font-size:32px;
  }

  button{
    font-size:18px;
    padding:16px;
  }

  .room-card{
    font-size:16px;
  }

}

</style>

</head>

<body>

<h1 id="secretTrigger">
  Werewolf Online
</h1>

<div class="menu">

  <a href="player.html">
    <button>
      เข้าเป็นผู้เล่น
    </button>
  </a>

  <a href="host-create.html">
    <button>
      เข้าเป็น GM
    </button>
  </a>

</div>

<div
  id="secretPanel"
  class="hidden"
>

  <h2>
    🔒 SECRET ADMIN
  </h2>

  <div id="roomList"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let tapCount = 0;
let tapTimer = null;

const trigger =
document.getElementById(
  "secretTrigger"
);

trigger.addEventListener(
  "click",
  function(){

    tapCount++;

    clearTimeout(tapTimer);

    tapTimer =
    setTimeout(function(){

      tapCount = 0;

    },1500);

    if(tapCount >= 5){

      openSecretPanel();

      tapCount = 0;
    }

  }
);

function openSecretPanel(){

  document.getElementById(
    "secretPanel"
  ).classList.remove(
    "hidden"
  );

  socket.emit(
    "getAllRooms"
  );

}

socket.on(
  "allRooms",
  function(rooms){

    const roomList =
    document.getElementById(
      "roomList"
    );

    roomList.innerHTML = "";

    if(rooms.length <= 0){

      roomList.innerHTML =
      "ไม่มีห้อง";

      return;
    }

    rooms.forEach(function(room){

      roomList.innerHTML +=
      '<div class="room-card">' +

      '<div>ห้อง: <b>' +
      room.roomCode +
      '</b></div>' +

      '<div>ผู้เล่น: ' +
      room.players.length +
      '</div>' +

      '<button class="delete-btn" onclick="deleteRoom(\'' +
      room.roomCode +
      '\')">' +

      'ยุบห้อง</button>' +

      '</div>';

    });

  }
);

function deleteRoom(roomCode){

  const confirmDelete =
  confirm(
    "ยุบห้อง " +
    roomCode +
    " ?"
  );

  if(!confirmDelete){
    return;
  }

  socket.emit(
    "closeRoom",
    roomCode
  );

  socket.emit(
    "getAllRooms"
  );

}

</script>

</body>

</html>
