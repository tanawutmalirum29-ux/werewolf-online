<!DOCTYPE html>
<html>

<head>

  <title>Werewolf Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{box-sizing:border-box;}

    body{
      margin:0;
      padding:20px;
      background:#111;
      color:white;
      font-family:Arial;
    }

    h1,h2,h3{margin-top:0;}

    .top-box{
      background:#1a1a1a;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
    }

    .room-code{
      font-size:30px;
      font-weight:bold;
      color:#5865f2;
    }

    .player-count{
      margin-top:10px;
      font-size:18px;
      opacity:0.8;
    }

    #playerList{margin-top:20px;}

    .player-card{
      background:#1e1e1e;
      border-radius:14px;
      padding:16px;
      margin-bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .player-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .avatar{
      width:45px;
      height:45px;
      border-radius:50%;
      background:#5865f2;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      font-size:18px;
    }

    .player-name{
      font-size:18px;
      font-weight:bold;
    }

    .status{
      color:#57f287;
      font-size:14px;
    }

    button{
      border:none;
      border-radius:16px;
      background:#5865f2;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      padding:14px;
    }

    button:hover{opacity:0.9;}

    .main-btn{
      width:100%;
      margin-top:20px;
    }

    .kick-btn{
      background:#ed4245;
      width:auto;
      padding:10px 14px;
      font-size:14px;
    }

    .danger-btn{
      background:#ed4245;
      margin-top:12px;
      width:100%;
    }

    .empty{
      background:#1a1a1a;
      padding:20px;
      border-radius:14px;
      text-align:center;
      opacity:0.7;
    }

  </style>

</head>

<body>

<h1>🎮 GAME LOBBY</h1>

<div class="top-box">

  <div>รหัสห้อง</div>
  <div class="room-code" id="roomText"></div>

  <div class="player-count">
    ผู้เล่น:
    <span id="playerCount">0</span>
  </div>

</div>

<h2>ผู้เล่นในห้อง</h2>

<div id="playerList"></div>

<button class="main-btn" onclick="startGame()">
  เริ่มเกม
</button>

<button class="danger-btn" onclick="closeRoom()">
  ยุบห้อง
</button>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
let room = null;

const roomCode = sessionStorage.getItem("roomCode");

/* =========================
   SAFE INIT (FIXED)
========================= */
if(!roomCode){
  location.href = "index.html";
}

/* =========================
   IMPORTANT FIX:
   host must NOT cause empty-room deletion
   -> force join as spectator
========================= */
socket.on("connect", () => {

  if(roomCode){

    socket.emit("joinRoomAsSpectator", roomCode);
    socket.emit("getRoom", roomCode);

  }

});

/* =========================
   ROOM DATA (SAFE)
========================= */
socket.on("roomData", (serverRoom) => {

  if(!serverRoom){
    return; // กัน redirect กระชากตอน reconnect
  }

  room = serverRoom;

  document.getElementById("roomText").innerText = room.roomCode;

  renderPlayers();

  if(room.started){
    location.href = "host-game.html";
  }

});

/* =========================
   ROOM CLOSED
========================= */
socket.on("roomClosed", () => {

  alert("ห้องถูกยุบ");
  sessionStorage.removeItem("roomCode");
  location.href = "index.html";

});

/* =========================
   RENDER PLAYERS (SAFE)
========================= */
function renderPlayers(){

  const playerList = document.getElementById("playerList");

  if(!room){
    playerList.innerHTML = "";
    return;
  }

  const players = room.players || [];

  document.getElementById("playerCount").innerText = players.length;

  playerList.innerHTML = "";

  if(players.length === 0){
    playerList.innerHTML = `
      <div class="empty">ยังไม่มีผู้เล่นเข้าห้อง</div>
    `;
    return;
  }

  players.forEach(player => {

    const firstLetter = player.name?.charAt(0) || "?";

    playerList.innerHTML += `
      <div class="player-card">

        <div class="player-left">

          <div class="avatar">${firstLetter}</div>

          <div>
            <div class="player-name">${player.name}</div>
            <div class="status">พร้อมเล่น</div>
          </div>

        </div>

        <button class="kick-btn"
          onclick="kickPlayer('${player.name.replace(/'/g, "\\'")}')">
          เตะ
        </button>

      </div>
    `;
  });

}

/* =========================
   KICK
========================= */
function kickPlayer(name){

  if(!confirm("เตะ " + name + " ?")) return;

  socket.emit("kickPlayer", {
    roomCode,
    name
  });

}

/* =========================
   START GAME
========================= */
function startGame(){

  if(!room) return;

  if(room.players.length !== room.roles.length){
    alert("จำนวนผู้เล่นไม่ตรงกับจำนวนอาชีพ");
    return;
  }

  socket.emit("startGame", roomCode);
}

/* =========================
   END GAME
========================= */
function closeRoom(){

  if(!confirm("ต้องการยุบห้อง ?")) return;

  socket.emit("endGame", roomCode);
}

</script>

</body>
</html>
